<!DOCTYPE html>  
<html lang="id">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>AQuil AI - Productivity Assistant</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  
  
        body {  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
            height: 100vh;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            padding: 10px;  
        }  
  
        .container {  
            width: 100%;  
            max-width: 600px;  
            height: 90vh;  
            background: white;  
            border-radius: 15px;  
            display: flex;  
            flex-direction: column;  
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);  
            overflow: hidden;  
        }  
  
        .header {  
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
            color: white;  
            padding: 20px;  
            text-align: center;  
            border-bottom: 3px solid #764ba2;  
        }  
  
        .header h1 {  
            font-size: 24px;  
            margin-bottom: 5px;  
        }  
  
        .header p {  
            font-size: 12px;  
            opacity: 0.9;  
        }  
  
        .chat-container {  
            flex: 1;  
            overflow-y: auto;  
            padding: 15px;  
            background: #f5f5f5;  
            display: flex;  
            flex-direction: column;  
            gap: 10px;  
        }  
  
        .message {  
            display: flex;  
            margin-bottom: 10px;  
            animation: slideIn 0.3s ease;  
        }  
  
        @keyframes slideIn {  
            from {  
                opacity: 0;  
                transform: translateY(10px);  
            }  
            to {  
                opacity: 1;  
                transform: translateY(0);  
            }  
        }  
  
        .message.user {  
            justify-content: flex-end;  
        }  
  
        .message.bot {  
            justify-content: flex-start;  
        }  
  
        .message-content {  
            max-width: 80%;  
            padding: 12px 15px;  
            border-radius: 12px;  
            word-wrap: break-word;  
            line-height: 1.4;  
            font-size: 14px;  
        }  
  
        .message.user .message-content {  
            background: #667eea;  
            color: white;  
            border-bottom-right-radius: 3px;  
        }  
  
        .message.bot .message-content {  
            background: white;  
            color: #333;  
            border: 1px solid #ddd;  
            border-bottom-left-radius: 3px;  
        }  
  
        .timestamp {  
            font-size: 11px;  
            color: #999;  
            margin-top: 3px;  
            text-align: center;  
        }  
  
        .loading {  
            display: flex;  
            gap: 4px;  
            align-items: center;  
        }  
  
        .loading-dot {  
            width: 8px;  
            height: 8px;  
            background: #667eea;  
            border-radius: 50%;  
            animation: bounce 1.4s infinite;  
        }  
  
        .loading-dot:nth-child(2) {  
            animation-delay: 0.2s;  
        }  
  
        .loading-dot:nth-child(3) {  
            animation-delay: 0.4s;  
        }  
  
        @keyframes bounce {  
            0%, 80%, 100% {  
                opacity: 0.3;  
                transform: translateY(0);  
            }  
            40% {  
                opacity: 1;  
                transform: translateY(-10px);  
            }  
        }  
  
        .input-area {  
            padding: 15px;  
            border-top: 1px solid #ddd;  
            display: flex;  
            gap: 10px;  
            background: white;  
        }  
  
        .input-area input {  
            flex: 1;  
            padding: 12px 15px;  
            border: 1px solid #ddd;  
            border-radius: 25px;  
            font-size: 14px;  
            outline: none;  
            transition: border-color 0.3s;  
        }  
  
        .input-area input:focus {  
            border-color: #667eea;  
        }  
  
        .input-area button {  
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
            color: white;  
            border: none;  
            border-radius: 50%;  
            width: 45px;  
            height: 45px;  
            cursor: pointer;  
            font-size: 18px;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            transition: transform 0.2s;  
        }  
  
        .input-area button:hover {  
            transform: scale(1.05);  
        }  
  
        .input-area button:active {  
            transform: scale(0.95);  
        }  
  
        @media (max-width: 600px) {  
            .container {  
                max-width: 100%;  
                height: 100vh;  
                border-radius: 0;  
            }  
  
            .message-content {  
                max-width: 90%;  
                font-size: 13px;  
            }  
        }  
  
        .chat-container::-webkit-scrollbar {  
            width: 6px;  
        }  
  
        .chat-container::-webkit-scrollbar-track {  
            background: #f1f1f1;  
        }  
  
        .chat-container::-webkit-scrollbar-thumb {  
            background: #888;  
            border-radius: 3px;  
        }  
    </style>  
</head>  
<body>  
    <div class="container">  
        <div class="header">  
            <h1>🤖 AQuil AI</h1>  
            <p>Asisten Produktivitas Cerdas Anda</p>  
        </div>  
  
        <div class="chat-container" id="chatContainer">  
            <div class="message bot">  
                <div>  
                    <div class="message-content">  
                        👋 <strong>Selamat datang di AQuil AI!</strong><br><br>  
                        Saya siap membantu Anda:<br>  
                        ✅ Mengerjakan tugas<br>  
                        ✅ Berpikir kritis<br>  
                        ✅ Memberikan motivasi<br>  
                        ✅ Mengoreksi kesalahan<br><br>  
                        Apa yang bisa saya bantu?  
                    </div>  
                    <div class="timestamp">Baru saja</div>  
                </div>  
            </div>  
        </div>  
  
        <div class="input-area">  
            <input   
                type="text"   
                id="messageInput"   
                placeholder="Ketik pesan Anda..."   
                autocomplete="off"  
            >  
            <button id="sendBtn" onclick="sendMessage()">➤</button>  
        </div>  
    </div>  
  
    <script src="script.js"></script>  
</body>  
</html>
